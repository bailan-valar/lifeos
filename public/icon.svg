<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="LifeOS">
  <defs>
    <linearGradient id="lifeos-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A84FF"/>
      <stop offset="1" stop-color="#005ECC"/>
    </linearGradient>
  </defs>
  <!-- full-bleed 背景：满足 maskable 规范，OS 会自行裁剪圆角/圆形 -->
  <rect width="512" height="512" fill="url(#lifeos-bg)"/>
  <!-- 2×2 模块网格：象征模块化的生活操作系统（笔记 / 记账 / 待办 / 时间），居中于 80% 安全区内 -->
  <g fill="#FFFFFF">
    <rect x="124" y="124" width="112" height="112" rx="26"/>
    <rect x="276" y="124" width="112" height="112" rx="26"/>
    <rect x="124" y="276" width="112" height="112" rx="26"/>
    <rect x="276" y="276" width="112" height="112" rx="26"/>
  </g>
</svg>
